<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Apexcify Technologys</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo-wrapper">
                <img src="Images/logo.jpg" alt="Apexcify Technologys Logo" class="logo-img">
                <span class="logo-text">Apexcify Technologys</span>
            </a>
            <nav class="navbar">
                <ul id="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="vision.html">Vision</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="internships.html">Internships</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="menu-toggle" id="mobile-menu">
                <i class='bx bx-menu' style="color: white; font-size: 2rem; cursor: pointer;"></i>
            </div>
        </div>
    </header>

    <main>
        <section class="contact" style="margin-top: var(--header-height);">
            <div class="container">
                <h2 class="section-title">Contact Us</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Your Message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="#"><i class='bx bxl-linkedin'></i></a>
                <a href="#"><i class='bx bxl-github'></i></a>
                <a href="#"><i class='bx bxl-instagram'></i></a>
            </div>
            <p>&copy; 2024 Apexcify Technologys - All Rights Reserved</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
